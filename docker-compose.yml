version: '3.8'

services:
  # Brain Age Prediction API Service
  brain-age-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: brain-age-api
    ports:
      - "5000:5000"
    volumes:
      - ./uploads:/app/uploads
      - ./backend/heatmaps:/app/heatmaps
      - ./backend.log:/app/backend.log
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - brain-age-network

networks:
  brain-age-network:
    driver: bridge

volumes:
  uploads:
  heatmaps:

