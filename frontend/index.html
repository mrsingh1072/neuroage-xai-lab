<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brain Age Predictor - CNN vs ViT</title>
  <link rel="icon" href="data:,">

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 1.1em;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }

    .main {
      background: #ffffff;
      padding: 30px;
      border-radius: 15px;
      width: 100%;
      max-width: 900px;
      box-shadow: 0px 10px 40px rgba(0,0,0,0.2);
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      font-size: 0.9em;
      margin-bottom: 25px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    .card {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      padding: 20px;
      border-radius: 12px;
      border: 2px solid #e0e0e0;
    }

    .card h3 {
      margin-top: 0;
      color: #333;
      font-size: 1.1em;
    }

    input[type="file"] {
      padding: 8px;
      margin-bottom: 15px;
      border: 2px solid #ddd;
      border-radius: 6px;
      width: 100%;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1em;
      font-weight: bold;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
    }

    button:active {
      transform: translateY(0);
    }

    .result-box {
      margin-top: 15px;
      padding: 20px;
      background: white;
      border-radius: 10px;
      border-left: 5px solid #667eea;
      display: none;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .result-box.visible {
      display: block;
    }

    .model-result {
      margin-bottom: 20px;
      padding: 15px;
      background: #f9f9f9;
      border-radius: 8px;
      border-left: 4px solid #667eea;
    }

    .model-result.vit {
      border-left-color: #764ba2;
    }

    .model-result.unavailable {
      border-left-color: #ccc;
      background: #f5f5f5;
      color: #999;
    }

    .model-name {
      font-weight: bold;
      font-size: 1.05em;
      margin-bottom: 8px;
      color: #333;
    }

    .age-display {
      font-size: 2em;
      font-weight: bold;
      color: #667eea;
      margin: 10px 0;
    }

    .model-result.vit .age-display {
      color: #764ba2;
    }

    .confidence {
      font-size: 0.95em;
      margin-top: 8px;
      color: #666;
    }

    .confidence-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85em;
      font-weight: bold;
      margin-left: 8px;
    }

    .confidence-badge.high {
      background: #4caf50;
      color: white;
    }

    .confidence-badge.medium {
      background: #ff9800;
      color: white;
    }

    .confidence-badge.low {
      background: #f44336;
      color: white;
    }

    .confidence-badge.unknown {
      background: #bdbdbd;
      color: white;
    }

    .error-message {
      color: #f44336;
      font-size: 0.9em;
      margin-top: 8px;
    }

    .comparison-section {
      background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
      padding: 15px;
      border-radius: 8px;
      margin-top: 20px;
      border-left: 4px solid #4caf50;
      display: none;
    }

    .comparison-section.visible {
      display: block;
    }

    .comparison-item {
      margin-bottom: 10px;
      font-size: 0.95em;
    }

    .comparison-item strong {
      color: #2e7d32;
    }

    .loading {
      color: #667eea;
      font-style: italic;
      font-size: 0.95em;
      min-height: 20px;
    }

    .error-box {
      background: linear-gradient(135deg, #ffebee 0%, #ffcdd2 100%);
      padding: 15px;
      border-radius: 8px;
      border-left: 4px solid #f44336;
      color: #c62828;
      margin-top: 15px;
      display: none;
    }

    .error-box.visible {
      display: block;
    }
  </style>
</head>

<body>

<div class="main">
  <h1>Brain Age Predictor</h1>
  <p class="subtitle">Comparing CNN and Vision Transformer Models</p>

  <div class="grid">

    <!-- LEFT: INPUT -->
    <div class="card">
      <h3>Select MRI Image</h3>
      <input type="file" id="imageInput" accept="image/*" />
      <button type="button" onclick="predictBoth()">Predict (CNN vs ViT)</button>
      <p id="loading" class="loading"></p>
    </div>

    <!-- RIGHT: RESULTS -->
    <div class="card">
      <h3>Prediction Results</h3>
      <div class="result-box" id="resultBox">
        <!-- CNN Result -->
        <div class="model-result cnn" id="cnnResult">
          <div class="model-name">CNN (Convolutional Neural Network)</div>
          <div class="age-display" id="cnnAge">-</div>
          <div class="confidence" id="cnnConfidence">Confidence: -</div>
        </div>

        <!-- ViT Result -->
        <div class="model-result vit" id="vitResult">
          <div class="model-name">ViT (Vision Transformer)</div>
          <div class="age-display" id="vitAge">-</div>
          <div class="confidence" id="vitConfidence">Confidence: -</div>
        </div>

        <!-- Comparison Section -->
        <div class="comparison-section" id="comparisonSection">
          <div class="comparison-item" id="differenceLine"></div>
          <div class="comparison-item" id="betterConfidenceLine"></div>
        </div>
      </div>

      <!-- Error Box -->
      <div class="error-box" id="errorBox"></div>
    </div>

  </div>
</div>

<script>
console.log("Frontend loaded");

async function predictBoth() {
    console.log("Predict button clicked");

    const file = document.getElementById("imageInput").files[0];

    if (!file) {
        alert("Please select an image!");
        return;
    }

    const loading = document.getElementById("loading");
    const resultBox = document.getElementById("resultBox");
    const errorBox = document.getElementById("errorBox");

    loading.innerText = "Processing both models...";
    resultBox.classList.remove("visible");
    errorBox.classList.remove("visible");

    try {
        // Call unified /predict endpoint
        let formData = new FormData();
        formData.append("image", file);

        let response = await fetch("http://127.0.0.1:5000/predict", {
            method: "POST",
            body: formData
        });

        let data = await response.json();
        console.log("Full Response:", data);

        loading.innerText = "";

        // Handle response
        if (data.status === "success" || data.status === "partial") {
            displayResults(data);
            resultBox.classList.add("visible");
        } else {
            showError("Prediction failed: " + (data.error || "Unknown error"));
        }

    } catch (err) {
        console.error("Error:", err);
        loading.innerText = "";
        showError("Server connection error: " + err.message);
    }
}

function displayResults(data) {
    // Display CNN Result
    const cnnData = data.cnn || {};
    const cnnAge = document.getElementById("cnnAge");
    const cnnConfidence = document.getElementById("cnnConfidence");
    const cnnResult = document.getElementById("cnnResult");

    if (cnnData.status === "success") {
        cnnAge.innerText = `${cnnData.predicted_age} yrs`;
        cnnConfidence.innerHTML = `Confidence: <span class="confidence-badge ${cnnData.confidence}">${cnnData.confidence || "unknown"}</span>`;
        cnnResult.style.opacity = "1";
    } else {
        cnnAge.innerText = "N/A";
        cnnConfidence.innerText = "CNN prediction failed";
        cnnResult.style.opacity = "0.7";
    }

    // Display ViT Result
    const vitData = data.vit || {};
    const vitAge = document.getElementById("vitAge");
    const vitConfidence = document.getElementById("vitConfidence");
    const vitResult = document.getElementById("vitResult");

    if (vitData.status === "success") {
        vitAge.innerText = `${vitData.predicted_age} yrs`;
        vitConfidence.innerHTML = `Confidence: <span class="confidence-badge ${vitData.confidence}">${vitData.confidence || "unknown"}</span>`;
        vitResult.style.opacity = "1";
    } else if (vitData.status === "not_available") {
        vitAge.innerText = "Not Available";
        vitConfidence.innerText = vitData.message || "ViT model not trained";
        vitResult.classList.add("unavailable");
        vitResult.style.opacity = "0.6";
    } else {
        vitAge.innerText = "Failed";
        vitConfidence.innerText = vitData.error || "Prediction failed";
        vitResult.style.opacity = "0.7";
    }

    // Display Comparison
    const comparison = data.comparison || {};
    const comparisonSection = document.getElementById("comparisonSection");
    const differenceLine = document.getElementById("differenceLine");
    const betterConfidenceLine = document.getElementById("betterConfidenceLine");

    if (cnnData.status === "success" && vitData.status === "success") {
        // Show comparison
        if (comparison.difference !== null && comparison.difference !== undefined) {
            differenceLine.innerHTML = `<strong>Difference:</strong> ${comparison.difference} years`;
        }

        if (comparison.better_confidence) {
            let betterModel = comparison.better_confidence === "cnn" ? "CNN" : 
                             comparison.better_confidence === "vit" ? "ViT" : "Both";
            betterConfidenceLine.innerHTML = `<strong>Higher Confidence:</strong> ${betterModel}`;
        }

        comparisonSection.classList.add("visible");
    } else {
        comparisonSection.classList.remove("visible");
    }
}

function showError(message) {
    const errorBox = document.getElementById("errorBox");
    errorBox.innerText = "Error: " + message;
    errorBox.classList.add("visible");
}
</script>

</body>
</html>
